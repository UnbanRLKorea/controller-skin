<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Controller Skin</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/gamepad.css">
</head>
<body>

    <div id="toast-hint" data-i18n="toast_hint"></div>

    <div class="controller" id="gamepad-ui" style="--controller-bg-color: #222; --controller-bg-image: none;">
        <div class="trigger-container" id="trigger-box-6"><div class="layer-physical"></div><div class="trigger-bar" id="trigger-bar-6"></div></div>
        <div class="trigger-container" id="trigger-box-7"><div class="layer-physical"></div><div class="trigger-bar" id="trigger-bar-7"></div></div>
        
        <div class="btn-wrapper bumper" id="btn-4"><div class="layer-physical"></div><div class="layer-effect"></div><div class="btn-text"></div></div>
        <div class="btn-wrapper bumper" id="btn-5"><div class="layer-physical"></div><div class="layer-effect"></div><div class="btn-text"></div></div>
        
        <div class="btn-wrapper btn-center" id="btn-8"><div class="layer-physical"></div><div class="layer-effect"></div><div class="btn-text">-</div></div>
        <div class="btn-wrapper btn-center" id="btn-16"><div class="layer-physical"></div><div class="layer-effect"></div><div class="btn-text"></div></div>
        <div class="btn-wrapper btn-center" id="btn-9"><div class="layer-physical"></div><div class="layer-effect"></div><div class="btn-text">+</div></div>
        
        <div class="stick-area" id="area-stick-l">
            <div class="stick-line" id="stick-line-l"></div>
            <div class="btn-wrapper stick" id="stick-l"><div class="layer-physical"></div><div class="layer-effect"></div></div>
        </div>
        <div class="stick-area" id="area-stick-r">
            <div class="stick-line" id="stick-line-r"></div>
            <div class="btn-wrapper stick" id="stick-r"><div class="layer-physical"></div><div class="layer-effect"></div></div>
        </div>
        
        <div class="btn-wrapper btn-dpad" id="btn-12"><div class="layer-physical"></div><div class="layer-effect"></div><div class="btn-text"></div></div>
        <div class="btn-wrapper btn-dpad" id="btn-13"><div class="layer-physical"></div><div class="layer-effect"></div><div class="btn-text"></div></div>
        <div class="btn-wrapper btn-dpad" id="btn-14"><div class="layer-physical"></div><div class="layer-effect"></div><div class="btn-text"></div></div>
        <div class="btn-wrapper btn-dpad" id="btn-15"><div class="layer-physical"></div><div class="layer-effect"></div><div class="btn-text"></div></div>
        
        <div class="btn-wrapper btn-action" id="btn-3"><div class="layer-physical"></div><div class="layer-effect"></div><div class="btn-text">Y</div></div>
        <div class="btn-wrapper btn-action" id="btn-2"><div class="layer-physical"></div><div class="layer-effect"></div><div class="btn-text">X</div></div>
        <div class="btn-wrapper btn-action" id="btn-1"><div class="layer-physical"></div><div class="layer-effect"></div><div class="btn-text">B</div></div>
        <div class="btn-wrapper btn-action" id="btn-0"><div class="layer-physical"></div><div class="layer-effect"></div><div class="btn-text">A</div></div>
    </div>

    <div id="settings-modal" class="hidden">
        <div class="modal-content">
            <h2><span data-i18n="modal_title"></span> <button class="btn-secondary" style="padding: 4px 10px; font-size:12px;" id="btn-close-top">✖</button></h2>
            <div id="modal-status" data-i18n="status_waiting"></div>

            <div class="editor-header">
                <select id="layout-target"></select>
                <button class="btn-primary" id="btn-add-custom" style="padding: 6px 10px; font-size: 12px;" data-i18n="btn_add_custom"></button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-target="pane-layout" data-i18n="tab_layout"></button>
                <button class="tab-btn" data-target="pane-design" data-i18n="tab_design"></button>
                <button class="tab-btn" data-target="pane-controller" data-i18n="tab_controller"></button>
            </div>

            <div id="pane-layout" class="tab-pane active">
                <div class="section-title"><span data-i18n="title_layout"></span> <span class="realtime-badge" data-i18n="badge_drag"></span></div>
                <div class="editor-grid">
                    <label><span data-i18n="lbl_x"></span><input type="number" id="edit-x"></label>
                    <label><span data-i18n="lbl_y"></span><input type="number" id="edit-y"></label>
                    <label><span data-i18n="lbl_w"></span><input type="number" id="edit-w"></label>
                    <label><span data-i18n="lbl_h"></span><input type="number" id="edit-h"></label>
                    <label class="text-full-width"><span data-i18n="lbl_text"></span><input type="text" id="edit-text" data-i18n-ph="ph_text"></label>
                    <label class="text-full-width"><span data-i18n="lbl_radius"></span><input type="number" id="edit-r" data-i18n-ph="ph_radius"></label>
                </div>

                <div class="editor-actions" style="margin-top: 15px;">
                    <button class="btn-secondary" id="btn-reset-layout" style="flex:1;" data-i18n="btn_del_layout"></button>
                    <button class="btn-primary" id="btn-apply-layout" data-i18n="btn_save"></button>
                </div>
            </div>

            <div id="pane-design" class="tab-pane">
                <div class="section-title" data-i18n="title_design"></div>
                <div class="editor-grid design-grid">
                    <div class="color-alpha-group"><label><span data-i18n="lbl_bg_c"></span><input type="color" id="edit-bgC"></label><label><span data-i18n="lbl_alpha"></span><input type="range" id="edit-bgC-alpha" min="0" max="1" step="0.01" value="1"></label></div>
                    <div class="color-alpha-group"><label><span data-i18n="lbl_ef_c"></span><input type="color" id="edit-efC"></label><label><span data-i18n="lbl_alpha"></span><input type="range" id="edit-efC-alpha" min="0" max="1" step="0.01" value="1"></label></div>
                    <div class="color-alpha-group"><label><span data-i18n="lbl_txt_c"></span><input type="color" id="edit-txtC"></label><label><span data-i18n="lbl_alpha"></span><input type="range" id="edit-txtC-alpha" min="0" max="1" step="0.01" value="1"></label></div>
                    <div class="color-alpha-group"><label><span data-i18n="lbl_txt_ac"></span><input type="color" id="edit-txtAC"></label><label><span data-i18n="lbl_alpha"></span><input type="range" id="edit-txtAC-alpha" min="0" max="1" step="0.01" value="1"></label></div>
                </div>
                <details class="image-url-details" style="margin-top: 10px; font-size: 13px;">
                    <summary style="cursor: pointer; font-weight: bold; color: #888;" data-i18n="summary_img"></summary>
                    <div style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ddd; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px;">
                        <div class="editor-grid-url-item"><label class="text-full-width"><span data-i18n="lbl_bg_img"></span><input type="text" id="edit-bgI" class="url-input" data-i18n-ph="ph_bg_img"></label></div>
                        <div class="editor-grid-url-item"><label class="text-full-width"><span data-i18n="lbl_ef_img"></span><input type="text" id="edit-efI" class="url-input" data-i18n-ph="ph_ef_img"></label></div>
                        <div class="text-full-width"><p style="margin-top: 8px; color: #c9302c; font-size: 12px;" data-i18n="warn_url"></p></div>
                    </div>
                </details>

                <div class="editor-actions" style="margin-top: 5px; margin-bottom: 5px"><button class="btn-secondary" id="btn-reset-design" style="flex:1;" data-i18n="btn_reset_indiv"></button><button class="btn-primary" id="btn-apply-design" data-i18n="btn_save"></button></div>
                <div class="editor-actions" style="margin-top: 10px; border-top: 1px solid #333;"><button class="btn-secondary" id="btn-apply-global"style="flex:1;" data-i18n="btn_apply_glob"></button><button class="btn-danger" id="btn-reset-global-design" data-i18n="btn_reset_glob"></button></div>
            </div>

            <div id="pane-controller" class="tab-pane">
                <div class="section-title" data-i18n="title_ctrl"></div>
                <div class="editor-grid design-grid">
                    <label><span data-i18n="lbl_w"></span><input type="number" id="ctrl-w" min="100" max="2000"></label>
                    <label><span data-i18n="lbl_h"></span><input type="number" id="ctrl-h" min="100" max="2000"></label>
                    <label><span data-i18n="lbl_ctrl_bg"></span><input type="color" id="ctrl-bgC"></label>
                    <label><span data-i18n="lbl_ctrl_preview"></span><input type="text" id="ctrl-bgC-text" readonly style="background: #1a1a19; cursor: not-allowed;"></label>
                    <label class="text-full-width"><span data-i18n="lbl_ctrl_img"></span><input type="text" id="ctrl-bgI" class="url-input" data-i18n-ph="ph_ctrl_img"></label>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button class="btn-secondary" id="btn-reset-controller" style="flex:1;" data-i18n="btn_ctrl_reset"></button>
                    <button class="btn-primary" id="btn-apply-controller" data-i18n="btn_ctrl_apply"></button>
                </div>
            </div>

            <div class="section-title" data-i18n="title_map"></div>
            <div class="mapping-control">
                <select id="map-src"></select> <span>➡️</span> <select id="map-tgt"></select>
                <button class="btn-primary" id="btn-add-map" data-i18n="btn_add"></button>
            </div>
            <ul class="mapping-list" id="mapping-list"></ul>

            <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 10px; cursor: pointer; margin-top: 10px;">
                <input type="checkbox" id="toggle-stick-line" style="width:16px; height:16px;"><span data-i18n="lbl_stick_line"></span>
            </label>

            <div class="footer-controls">
                <button class="btn-copy" id="btn-copy-url" data-i18n="btn_copy_url"></button>
                <button class="btn-secondary" id="btn-close-modal" data-i18n="btn_close"></button>
            </div>
        </div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/state.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/input.js"></script>
    
    <script>
        window.applyTranslations();
        window.loadFromURL();
        window.applyLayouts();
        window.populateDropdowns();
    </script>
</body>
</html>
